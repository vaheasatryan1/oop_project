<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Crawler</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --bg:        #0d1117;
          --bg2:       #161b22;
          --bg3:       #1c2128;
          --border:    #30363d;
          --border2:   #444c56;
          --gold:      #e2b96f;
          --gold2:     #f5d78e;
          --dim:       #6e7681;
          --green:     #3fb950;
          --red:       #f85149;
          --blue:      #58a6ff;
          --amber:     #d29922;
          --purple:    #a371f7;
          --mono: 'Share Tech Mono', monospace;
          --serif: 'Cinzel', serif;
          --cell: 14px;
        }

        body {
          background: var(--bg);
          color: var(--gold);
          font-family: var(--mono);
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
        }

        header {
          width: 100%;
          max-width: 1000px;
          display: flex;
          align-items: baseline;
          justify-content: space-between;
          padding: 20px 16px 12px;
          border-bottom: 1px solid var(--border);
        }

        h1 {
          font-family: var(--serif);
          font-size: 20px;
          font-weight: 600;
          letter-spacing: 5px;
          color: var(--gold2);
        }

        #level-badge {
          font-size: 11px;
          color: var(--dim);
          letter-spacing: 2px;
        }

        #layout {
          width: 100%;
          max-width: 1000px;
          display: grid;
          grid-template-columns: 1fr 230px;
          gap: 12px;
          padding: 12px 16px;
        }

        #map-wrap {
          position: relative;
          background: var(--bg2);
          border: 1px solid var(--border);
          border-radius: 8px;
          overflow: hidden;
        }

        #map-canvas {
          display: block;
          image-rendering: pixelated;
        }

        #side {
          display: flex;
          flex-direction: column;
          gap: 10px;
        }

        .box {
          background: var(--bg2);
          border: 1px solid var(--border);
          border-radius: 8px;
          padding: 10px 12px;
        }

        .box-label {
          font-size: 10px;
          letter-spacing: 2px;
          color: var(--dim);
          margin-bottom: 8px;
          font-family: var(--serif);
        }

        #key-parts {
          display: flex;
          gap: 6px;
          flex-wrap: wrap;
        }

        .part {
          width: 26px; height: 26px;
          border-radius: 5px;
          border: 1px solid var(--border);
          display: flex; align-items: center; justify-content: center;
          font-size: 12px;
          color: var(--dim);
          transition: all 0.2s;
        }
        .part.got { background: #2d1f00; color: var(--amber); border-color: var(--amber); }
        .part.complete { background: #0d2f0d; color: var(--green); border-color: var(--green); }

        .res-row {
          display: flex; align-items: center; gap: 8px;
          font-size: 12px; margin-bottom: 5px;
        }
        .res-icon { font-size: 14px; width: 16px; text-align: center; }

        .item-row {
          display: flex; align-items: center; justify-content: space-between;
          font-size: 12px; padding: 5px 7px; border-radius: 5px;
          margin-bottom: 4px; cursor: pointer;
          border: 1px solid transparent;
          transition: all 0.15s;
          user-select: none;
        }
        .item-row:hover { background: var(--bg3); }
        .item-row.equipped {
          border-color: var(--gold);
          background: #1c1700;
          color: var(--gold2);
        }
        .item-slot { color: var(--dim); font-size: 10px; margin-right: 4px; }

        #dpad {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 4px;
          margin-bottom: 8px;
        }
        .btn {
          background: var(--bg);
          border: 1px solid var(--border);
          border-radius: 6px;
          color: var(--gold);
          font-family: var(--mono);
          font-size: 13px;
          padding: 7px 4px;
          cursor: pointer;
          transition: background 0.1s, transform 0.08s;
          text-align: center;
          line-height: 1;
        }
        .btn:hover  { background: var(--bg3); border-color: var(--border2); }
        .btn:active { transform: scale(0.93); }
        .btn.action {
          font-size: 10px;
          letter-spacing: 0.5px;
          background: #160e00;
          border-color: var(--amber);
          color: var(--amber);
        }
        .btn.action:hover { background: #201500; }

        #action-row {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 4px;
        }

        #log {
          height: 100px;
          overflow-y: auto;
          font-size: 11px;
          line-height: 1.65;
          scrollbar-width: thin;
          scrollbar-color: var(--border) transparent;
        }
        .le { padding: 1px 0; color: var(--dim); }
        .le.hi  { color: var(--gold2); }
        .le.ok  { color: var(--green); }
        .le.war { color: var(--amber); }
        .le.err { color: var(--red); }

        #modal-wrap {
          display: none;
          position: fixed; inset: 0;
          background: rgba(0,0,0,0.72);
          align-items: center;
          justify-content: center;
          z-index: 100;
        }
        #modal-wrap.open { display: flex; }

        .modal {
          background: var(--bg2);
          border: 1px solid var(--gold);
          border-radius: 10px;
          padding: 22px 24px;
          min-width: 280px;
          max-width: 340px;
          width: 90vw;
        }
        .modal-title {
          font-family: var(--serif);
          font-size: 14px;
          letter-spacing: 2px;
          color: var(--gold2);
          border-bottom: 1px solid var(--border);
          padding-bottom: 10px;
          margin-bottom: 14px;
        }
        .modal-res {
          font-size: 11px; color: var(--dim);
          margin-bottom: 12px;
          line-height: 1.7;
        }
        .recipe-btn {
          width: 100%; text-align: left;
          background: var(--bg); border: 1px solid var(--border);
          border-radius: 6px; color: var(--gold); font-family: var(--mono);
          font-size: 12px; padding: 9px 11px; cursor: pointer; margin-bottom: 7px;
          transition: all 0.13s;
          display: block;
        }
        .recipe-btn:hover:not([disabled]) { background: var(--bg3); border-color: var(--gold); }
        .recipe-btn[disabled] { opacity: 0.38; cursor: not-allowed; }
        .recipe-sub { font-size: 10px; color: var(--dim); margin-top: 3px; }
        .modal-close {
          margin-top: 8px; width: 100%;
          background: transparent; border: 1px solid var(--border2);
          border-radius: 6px; color: var(--dim); font-family: var(--mono);
          font-size: 11px; padding: 7px; cursor: pointer;
          transition: all 0.13s;
        }
        .modal-close:hover { border-color: var(--gold); color: var(--gold); }

        #win-wrap {
          display: none;
          position: fixed; inset: 0;
          background: rgba(0,0,0,0.85);
          align-items: center;
          justify-content: center;
          z-index: 200;
        }
        #win-wrap.open { display: flex; }
        .win-box {
          background: var(--bg2);
          border: 1px solid var(--gold);
          border-radius: 12px;
          padding: 32px 36px;
          text-align: center;
          max-width: 360px;
        }
        .win-title {
          font-family: var(--serif);
          font-size: 22px;
          color: var(--gold2);
          margin-bottom: 12px;
          letter-spacing: 3px;
        }
        .win-sub { font-size: 12px; color: var(--dim); line-height: 1.8; margin-bottom: 20px; }
        .win-btn {
          background: #1c1700; border: 1px solid var(--gold);
          border-radius: 7px; color: var(--gold2); font-family: var(--mono);
          font-size: 13px; padding: 10px 28px; cursor: pointer;
          transition: background 0.15s;
        }
        .win-btn:hover { background: #2a2100; }

        #legend {
          grid-column: 1 / -1;
          display: flex; flex-wrap: wrap; gap: 10px;
          font-size: 10px; color: var(--dim);
          border-top: 1px solid var(--border);
          padding-top: 8px;
        }
        .leg { display: flex; align-items: center; gap: 5px; }
        .leg-sym { font-weight: bold; }

        #hint { font-size: 10px; color: var(--dim); text-align: center; padding-bottom: 10px; letter-spacing: 1px; }
    </style>
</head>
<body>

<header>
    <h1>DUNGEON CRAWLER</h1>
    <div id="level-badge">LEVEL <span id="lnum">1</span> / 10</div>
</header>

<div id="layout">
    <div id="map-wrap">
        <canvas id="map-canvas"></canvas>
    </div>

    <div id="side">
        <div class="box">
            <div class="box-label">KEY STATUS</div>
            <div id="key-parts"></div>
        </div>

        <div class="box">
            <div class="box-label">RESOURCES</div>
            <div id="res-display"></div>
        </div>

        <div class="box">
            <div class="box-label">ITEMS <span id="equipped-hint" style="color:var(--dim);font-size:10px;margin-left:4px">(click to equip)</span></div>
            <div id="items-display"></div>
        </div>

        <div class="box">
            <div class="box-label">CONTROLS</div>
            <div id="dpad">
                <div></div>
                <button class="btn" id="btn-up"   title="W">&#x25b2;</button>
                <div></div>
                <button class="btn" id="btn-left" title="A">&#x25c4;</button>
                <button class="btn" id="btn-down" title="S">&#x25bc;</button>
                <button class="btn" id="btn-right"title="D">&#x25ba;</button>
            </div>
            <div id="action-row">
                <button class="btn action" id="btn-use">USE (E)</button>
                <button class="btn action" id="btn-craft">CRAFT (C)</button>
            </div>
        </div>

        <div class="box">
            <div class="box-label">LOG</div>
            <div id="log"></div>
        </div>
    </div>

    <div id="legend">
        <span class="leg"><span class="leg-sym" style="color:#f5d78e">@</span> you</span>
        <span class="leg"><span class="leg-sym" style="color:#94a3b8">R</span> rock</span>
        <span class="leg"><span class="leg-sym" style="color:#92400e">S</span> stick</span>
        <span class="leg"><span class="leg-sym" style="color:#d97706">K/1/2/3</span> key / key parts</span>
        <span class="leg"><span class="leg-sym" style="color:#a855f7">D</span> door</span>
        <span class="leg"><span class="leg-sym" style="color:#475569">W</span> breakable wall</span>
        <span class="leg"><span class="leg-sym" style="color:#1e2a3a">#</span> wall</span>
    </div>
</div>

<div id="hint">WASD or arrow keys to move &middot; E = use &middot; C = craft</div>

<!-- Crafting modal -->
<div id="modal-wrap">
    <div class="modal">
        <div class="modal-title">CRAFTING</div>
        <div class="modal-res" id="modal-res-text"></div>
        <div id="recipe-list"></div>
        <button class="modal-close" id="close-craft">CLOSE</button>
    </div>
</div>

<!-- Win modal -->
<div id="win-wrap">
    <div class="win-box">
        <div class="win-title">&#x2694; VICTORY &#x2694;</div>
        <div class="win-sub">You conquered all 10 levels.<br>The dungeon has been cleared!</div>
        <button class="win-btn" id="restart-btn">PLAY AGAIN</button>
    </div>
</div>

<script>
    // MAP DATA
    const MAPS = [
     { id:"level1",  next:"level2",  raw:`##############################\n#P...........................#\n#............................#\n#............................#\n#............................#\n#............................#\n#............................#\n#............................#\n#............................#\n#............................#\n#.............K..............#\n#............................#\n#............................#\n#............................#\n#............................#\n#............................#\n#............................#\n#..........................D.#\n#............................#\n##############################` },
     { id:"level2",  next:"level3",  raw:`##############################\n#P...........................#\n#............................#\n#............................#\n#............................#\n#............................#\n#............................#\n#............................#\n#............................#\n#............................#\n#.....1......................#\n#............................#\n#............................#\n#............................#\n#.2......................3...#\n#............................#\n#............................#\n#..........................D.#\n#............................#\n##############################` },
     { id:"level3",  next:"level4",  raw:`##############################\n#P...........................#\n#....R.....S.................#\n#............................#\n#............................#\n#............................#\n#............................#\n#............................#\n#....######..................#\n#....#.......................#\n#....#.....1.................#\n#....#.......................#\n#....WWWW....................#\n#............................#\n#.2......................3...#\n#............................#\n#............................#\n#..........................D.#\n#............................#\n##############################` },
     { id:"level4",  next:"level5",  raw:`##############################\n#P...........................#\n#.............#..............#\n#.............#.....R........#\n#....R........#..............#\n#.......1.......##########...#\n#.........S...#..............#\n#.............#.....S........#\n#............................#\n#.............#..............#\n#.......2.....#..............#\n#.............#.....WWWW.....#\n#.............#..............#\n#.............#..........3...#\n#.............#..............#\n#.............#..............#\n#.............#.......WWW....#\n#.............#............D.#\n#............................#\n##############################` },
     { id:"level5",  next:"level6",  raw:`##############################\n#P...........................#\n#.#########################..#\n#.#.......R........WWW....#..#\n#.#..###################..#..#\n#.#.#...S...............#.#..#\n#.#.#..###############..#.#..#\n#.#.#.#...............#.#.#..#\n#.#.#.#...............#.#.#..#\n#.#.#.#.....1.....2...#.#.#..#\n#.#.#.#........3......#.#.#..#\n#.#.#.#...............#.#.#..#\n#.#.#.#...............#.#.#..#\n#.#.#.#...............#.#.#..#\n#.#.#..###############..#.#..#\n#.#.#...................#.#..#\n#.#..###################..#..#\n#..........................D.#\n#..#######################...#\n##############################` },
     { id:"level6",  next:"level7",  raw:`##############################\n#P...........................#\n#.....R......................#\n#...##########...............#\n#.S.#......1.................#\n#...#........................#\n#.########..##########.......#\n#.........WWW.#..............#\n#.............#..............#\n#.............#.############.#\n#....2................#......#\n#.....................#......#\n#.############........#......#\n#.......#.........WWW...3....#\n#.......#....................#\n#.......#.......##########...#\n#............................#\n#..........................D.#\n#............................#\n##############################` },
     { id:"level7",  next:"level8",  raw:`##############################\n#P...........................#\n#.#############.############.#\n#.#R.......................#.#\n#.#.############.#########.#.#\n#.#.#S...................#.#.#\n#.#.#.###########.######.#.#.#\n#.#.#.#.......WW.......#.#.#.#\n#.#.#.#..#########.##..#.#.#.#\n#.#.#.#..#..1...2...#..#.#.#.#\n#.#.#.#..#....3.....#..#.#.#.#\n#.#.#.#..#.##########..#.#.#.#\n#.#.#.#.......WW.......#.#.#.#\n#.#.#.#.################.#.#.#\n#.#.#....................#.#.#\n#.#.#.####################.#.#\n#.#........................#.#\n#.#.######################D#.#\n#............................#\n##############################` },
     { id:"level8",  next:"level9",  raw:`##############################\n#P........#.........#........#\n#.........#....S....#........#\n#....R....#.........#........#\n#.........#.........#........#\n#...#################........#\n#.........#.........#........#\n#....R....#....S....#........#\n#.....1...#...2.....#........#\n#.........#..................#\n#............................#\n#.........#....WWW..#........#\n#.........#.........#........#\n#.........#.........#.3......#\n#...#################........#\n#.........#.........#........#\n#.........#.........#........#\n#.........#.........#......D.#\n#.........#.........#........#\n##############################` },
     { id:"level9",  next:"level10", raw:`##############################\n#P...........................#\n#....R.......................#\n#.#.#####################....#\n#.................WWW.S.#....#\n#......1................#....#\n#...############........#....#\n#...#...WWW.............#....#\n#...#........................#\n#...#............2....R.#....#\n#...#.....##############.....#\n#...#...S.#..................#\n#...#.....#.....####.#####...#\n#...#.....#...........W.3....#\n#...#.....#...........W......#\n#....#####............W......#\n#............................#\n#..........................D.#\n#............................#\n##############################` },
     { id:"level10", next:null,      raw:`##############################\n#P...........................#\n#......#..S...#......#..S....#\n#..R...#......#..R...#.......#\n#......#..S...#......#.......#\n#..WWW.#.######......#WWW....#\n#......#..1..........#.......#\n#..R...#......#.######.......#\n#......#......#......#.......#\n#..####.......#......#.#####.#\n#......#.WWW..#..2...#.......#\n#......#......#.######.......#\n#......#......#......#.......#\n#......#.######..............#\n#......#......#..W...#.......#\n#......#......#..W...#.......#\n#......#..3...#..W...#.......#\n#......#......#......#.....D.#\n#............................#\n##############################` }
    ];

    // CANVAS
    const CELL = 14;
    const canvas = document.getElementById('map-canvas');
    const ctx = canvas.getContext('2d');

    const COLORS = {
      '#': { bg: '#0a0f17', fg: '#1e2a3a' },
      '.': { bg: '#0d1117', fg: '#0d1117' },
      'W': { bg: '#111827', fg: '#475569' },
      'D': { bg: '#1a0a2e', fg: '#a855f7' },
      'K': { bg: '#1c1200', fg: '#d97706' },
      '1': { bg: '#1c1200', fg: '#d97706' },
      '2': { bg: '#1c1200', fg: '#d97706' },
      '3': { bg: '#1c1200', fg: '#d97706' },
      'R': { bg: '#0d1117', fg: '#94a3b8' },
      'S': { bg: '#0d1117', fg: '#92400e' },
      '@': { bg: '#1c1600', fg: '#f5d78e' },
    };

    function tileColor(ch) { return COLORS[ch] || { bg: '#0d1117', fg: '#334155' }; }

    let G;

    function parseMap(raw) {
      const lines = raw.split('\n');
      const rows = lines.length;
      const cols = Math.max(...lines.map(l => l.length));
      const grid = [];
      let start = null;
      for (let r = 0; r < rows; r++) {
        grid[r] = [];
        for (let c = 0; c < cols; c++) {
          const ch = c < lines[r].length ? lines[r][c] : '#';
          if (ch === 'P') { start = {r, c}; grid[r][c] = '.'; }
          else grid[r][c] = ch;
        }
      }
      return { grid, rows, cols, start };
    }

    function initGame() {
      const lvl = MAPS[0];
      const mapData = parseMap(lvl.raw);
      G = {
        levelIdx: 0,
        mapData,
        player: { ...mapData.start },
        resources: { ROCK: 0, STICK: 0 },
        items: [],
        equippedIdx: -1,
        keyParts: new Set(),
        hasFullKey: false,
        complete: false,
        logs: []
      };
      addLog('Welcome, adventurer. Find the key and reach the door.', 'hi');
      render();
    }

    function tile(r, c) {
      const {grid, rows, cols} = G.mapData;
      if (r < 0 || r >= rows || c < 0 || c >= cols) return '#';
      return grid[r][c];
    }
    function setTile(r, c, ch) { G.mapData.grid[r][c] = ch; }

    function hasKey() {
      if (G.hasFullKey) return true;
      return G.keyParts.has('1') && G.keyParts.has('2') && G.keyParts.has('3');
    }

    function addLog(msg, cls = '') {
      G.logs.unshift({ msg, cls });
      if (G.logs.length > 60) G.logs.pop();
    }

    function itemCount(name) { return G.items.filter(i => i.name === name).length; }
    function removeItem(name) {
      const idx = G.items.findIndex(i => i.name === name);
      if (idx === -1) return;
      G.items.splice(idx, 1);
      if (G.equippedIdx >= G.items.length) G.equippedIdx = G.items.length - 1;
    }
    function equippedItem() { return G.items[G.equippedIdx] || null; }

    function move(dr, dc) {
      if (G.complete) return;
      const nr = G.player.r + dr;
      const nc = G.player.c + dc;
      const t = tile(nr, nc);

      if (t === '#') return;

      if (t === 'W') {
        addLog('Breakable wall! Equip a Pickaxe or Bomb and press USE.', 'war');
        render(); return;
      }

      if (t === 'R') {
        G.resources.ROCK++;
        setTile(nr, nc, '.'); G.player = {r:nr, c:nc};
        addLog('Picked up Rock.', 'ok'); render(); return;
      }
      if (t === 'S') {
        G.resources.STICK++;
        setTile(nr, nc, '.'); G.player = {r:nr, c:nc};
        addLog('Picked up Stick.', 'ok'); render(); return;
      }
      if (t === 'K') {
        G.hasFullKey = true;
        setTile(nr, nc, '.'); G.player = {r:nr, c:nc};
        addLog('You found the key!', 'ok'); render(); return;
      }
      if (t === '1' || t === '2' || t === '3') {
        G.keyParts.add(t);
        setTile(nr, nc, '.'); G.player = {r:nr, c:nc};
        addLog(`Key part ${t} collected.`, 'ok');
        if (hasKey()) addLog('All key parts found! Find the door.', 'hi');
        render(); return;
      }
      if (t === 'D') {
        if (hasKey()) { nextLevel(); }
        else { addLog('The door is locked. Find the key first.', 'war'); }
        render(); return;
      }

      G.player = {r:nr, c:nc};
      render();
    }

    function useItem() {
      const eq = equippedItem();
      if (!eq) { addLog('Nothing equipped. Craft something first (press C).', 'war'); render(); return; }

      const {r, c} = G.player;
      const neighbors = [{r:r-1,c},{r:r+1,c},{r,c:c-1},{r,c:c+1}];

      if (eq.name === 'PICKAXE') {
        let broke = false;
        for (const n of neighbors) {
          if (tile(n.r, n.c) === 'W') {
            setTile(n.r, n.c, '.');
            broke = true;
            break;
          }
        }
        if (broke) { removeItem('PICKAXE'); addLog('Wall broken with pickaxe!', 'ok'); }
        else addLog('No breakable wall adjacent.', 'war');
        render(); return;
      }

      if (eq.name === 'BOMB') {
        let broke = false;
        for (const n of neighbors) {
          if (tile(n.r, n.c) === 'W') {
            setTile(n.r, n.c, '.');
            broke = true;
            const blast = [{r:n.r-1,c:n.c},{r:n.r+1,c:n.c},{r:n.r,c:n.c-1},{r:n.r,c:n.c+1}];
            for (const b of blast) {
              if (tile(b.r, b.c) === 'W') setTile(b.r, b.c, '.');
            }
          }
        }
        if (broke) { removeItem('BOMB'); addLog('BOOM! Walls destroyed!', 'ok'); }
        else addLog('No breakable wall adjacent.', 'war');
        render(); return;
      }
    }

    function removeResource(name, amount) {
      if (G.resources[name] < amount)
        throw new Error(`Cannot remove ${amount} ${name}; only ${G.resources[name]} held.`);
      G.resources[name] -= amount;
    }

    const RECIPES = [
      { name:'PICKAXE', label:'Pickaxe',  desc:'2 ROCK + 1 STICK', cost:{ ROCK:2, STICK:1 } },
      { name:'BOMB',    label:'Bomb',     desc:'1 ROCK + 2 STICK', cost:{ ROCK:1, STICK:2 } },
    ];

    function canCraft(recipe) {
      return Object.entries(recipe.cost).every(([res, amt]) => G.resources[res] >= amt);
    }

    function craft(recipe) {
      if (!canCraft(recipe)) return false;
      for (const [res, amt] of Object.entries(recipe.cost)) removeResource(res, amt);
      G.items.push({ name: recipe.name, label: recipe.label });
      if (G.equippedIdx === -1) G.equippedIdx = 0;
      return true;
    }

    function nextLevel() {
      const cur = MAPS[G.levelIdx];
      if (!cur.next) {
        G.complete = true;
        document.getElementById('win-wrap').classList.add('open');
        return;
      }
      addLog('Level complete! Descending…', 'hi');
      G.levelIdx++;
      const mapData = parseMap(MAPS[G.levelIdx].raw);
      G.mapData = mapData;
      G.player = { ...mapData.start };
      G.keyParts = new Set();
      G.hasFullKey = false;
    }

    function drawMap() {
      const {grid, rows, cols} = G.mapData;
      canvas.width  = cols * CELL;
      canvas.height = rows * CELL;
      ctx.font = `bold ${CELL}px 'Share Tech Mono', monospace`;
      ctx.textBaseline = 'top';

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const isPlayer = G.player.r === r && G.player.c === c;
          const ch = isPlayer ? '@' : grid[r][c];
          const col = tileColor(ch);
          ctx.fillStyle = col.bg;
          ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
          ctx.fillStyle = col.fg;
          ctx.fillText(ch, c * CELL, r * CELL);
        }
      }
    }

    function renderHUD() {
      document.getElementById('lnum').textContent = G.levelIdx + 1;

      const kp = document.getElementById('key-parts');
      if (hasKey()) {
        kp.innerHTML = `<span class="part complete" style="width:auto;padding:0 10px">KEY COMPLETE</span>`;
      } else {
        kp.innerHTML = ['1','2','3'].map(p => {
          const got = G.keyParts.has(p);
          return `<span class="part ${got ? 'got' : ''}">${p}</span>`;
        }).join('') + `<span style="font-size:10px;color:var(--dim);margin-left:4px;align-self:center">${G.keyParts.size}/3</span>`;
      }

      const rd = document.getElementById('res-display');
      rd.innerHTML = '';
      const resMap = [['ROCK','&#x2B21;','#94a3b8'],['STICK','|','#92400e']];
      let anyRes = false;
      for (const [key, sym, color] of resMap) {
        if (G.resources[key] > 0) {
          anyRes = true;
          rd.innerHTML += `<div class="res-row"><span class="res-icon" style="color:${color}">${sym}</span><span>${key}</span><span style="margin-left:auto;color:var(--gold2)">&times;${G.resources[key]}</span></div>`;
        }
      }
      if (!anyRes) rd.innerHTML = `<span style="color:var(--dim);font-size:11px">none</span>`;

      const id = document.getElementById('items-display');
      id.innerHTML = '';
      if (G.items.length === 0) {
        id.innerHTML = `<span style="color:var(--dim);font-size:11px">none</span>`;
      } else {
        G.items.forEach((item, idx) => {
          const isEq = idx === G.equippedIdx;
          const div = document.createElement('div');
          div.className = 'item-row' + (isEq ? ' equipped' : '');
          div.innerHTML = `<span><span class="item-slot">[${idx+1}]</span>${item.label}</span>${isEq ? '<span style="font-size:10px;color:var(--amber)">equipped</span>' : ''}`;
          div.onclick = () => { G.equippedIdx = idx; renderHUD(); };
          id.appendChild(div);
        });
      }

      const logEl = document.getElementById('log');
      logEl.innerHTML = G.logs.map(l =>
        `<div class="le ${l.cls}">${l.msg}</div>`
      ).join('');
    }

    function render() { drawMap(); renderHUD(); }

    function openCrafting() {
      const resText = Object.entries(G.resources)
        .map(([k,v]) => `${k} &times;${v}`).join('  &middot;  ') || 'none';
      document.getElementById('modal-res-text').innerHTML = 'Resources: ' + resText;

      const rl = document.getElementById('recipe-list');
      rl.innerHTML = '';
      for (const recipe of RECIPES) {
        const ok = canCraft(recipe);
        const btn = document.createElement('button');
        btn.className = 'recipe-btn';
        btn.disabled = !ok;
        btn.innerHTML = `<div>${recipe.label}</div><div class="recipe-sub">${recipe.desc}${ok ? '' : ' — need more resources'}</div>`;
        btn.onclick = () => {
          if (craft(recipe)) {
            addLog(`Crafted: ${recipe.label}.`, 'ok');
            closeCrafting();
            render();
          }
        };
        rl.appendChild(btn);
      }
      document.getElementById('modal-wrap').classList.add('open');
    }

    function closeCrafting() {
      document.getElementById('modal-wrap').classList.remove('open');
    }

    document.addEventListener('keydown', e => {
      if (document.getElementById('modal-wrap').classList.contains('open')) {
        if (e.key === 'Escape' || e.key.toLowerCase() === 'q') closeCrafting();
        return;
      }
      const k = e.key.toLowerCase();
      if      (k === 'w' || k === 'arrowup')    { e.preventDefault(); move(-1, 0); }
      else if (k === 's' || k === 'arrowdown')  { e.preventDefault(); move( 1, 0); }
      else if (k === 'a' || k === 'arrowleft')  { e.preventDefault(); move( 0,-1); }
      else if (k === 'd' || k === 'arrowright') { e.preventDefault(); move( 0, 1); }
      else if (k === 'e') useItem();
      else if (k === 'c') openCrafting();
      else if (k === '1') { G.equippedIdx = 0; renderHUD(); }
      else if (k === '2') { G.equippedIdx = 1; renderHUD(); }
    });

    document.getElementById('btn-up').onclick    = () => move(-1, 0);
    document.getElementById('btn-down').onclick  = () => move( 1, 0);
    document.getElementById('btn-left').onclick  = () => move( 0,-1);
    document.getElementById('btn-right').onclick = () => move( 0, 1);
    document.getElementById('btn-use').onclick   = () => useItem();
    document.getElementById('btn-craft').onclick = () => openCrafting();
    document.getElementById('close-craft').onclick = closeCrafting;
    document.getElementById('restart-btn').onclick = () => {
      document.getElementById('win-wrap').classList.remove('open');
      initGame();
    };

    initGame();
</script>
</body>
</html>
